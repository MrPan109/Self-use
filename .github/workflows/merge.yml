name: Auto Merge Surge Rules

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch: # 保持手动触发按钮

jobs:
  merge-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 执行合并脚本
      # ⚡️注意：因为你把脚本放在 Rule 文件夹下，这里要加上路径
      run: python Rule/merge.py

    - name: 检查文件是否有变动并提交
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # ⚡️注意：这里同样修改为指定追踪 rule 文件夹下的 AdDIY.list
        git add Rule/AdDIY.list
        if ! git diff --cached --quiet; then
          git commit -m "chore: 自动更新 Rule/AdDIY.list"
          git push
        else
          echo "规则没有变化，无需更新。"
        fi
