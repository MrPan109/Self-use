name: Auto Merge Surge Rules

on:
  schedule:
    # 每天北京时间凌晨 04:00 自动运行 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击触发更新

jobs:
  merge-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予工作流向仓库写入和提交文件的权限

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 执行合并脚本
      run: python merge.py

    - name: 检查文件是否有变动并提交
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add AdDIY.list # 👈 这里修改成了新文件名
        if ! git diff --cached --quiet; then
          git commit -m "chore: 自动更新 AdDIY.list 规则"
          git push
        else
          echo "规则没有变化，无需更新。"
        fi


